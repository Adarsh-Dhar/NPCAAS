kind = "web"
previewPath = "/"
title = "NeoCity Game"
version = "1.0.0"
id = "artifacts/neocity-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23307

[services.development]
run = "pnpm --filter @workspace/neocity-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neocity-game", "run", "build" ]
publicDir = "artifacts/neocity-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23307"
BASE_PATH = "/"
